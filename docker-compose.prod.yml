# Деплой с Docker Hub: подставь свой логин в image (DOCKERHUB_USERNAME/rise-and-shine-bot:latest).
# На сервере: .env + этот файл, затем docker compose -f docker-compose.prod.yml pull && up -d
services:
  bot:
    image: DOCKERHUB_USERNAME/rise-and-shine-bot:latest
    container_name: rise-and-shine-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot_data:/app/data
    environment:
      - BOT_DATA_DIR=/app/data

volumes:
  bot_data:
