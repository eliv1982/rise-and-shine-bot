services:
  bot:
    build: .
    image: rise-and-shine-bot:latest
    container_name: rise-and-shine-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      # данные и логи переживают перезапуск контейнера и обновление образа
      - bot_data:/app/data
    environment:
      - BOT_DATA_DIR=/app/data
    working_dir: /app

volumes:
  bot_data:
